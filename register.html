<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Project Grid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0D1117;
            --border-color: rgba(255, 255, 255, 0.1);
            --glow-cyan: 0 0 5px #06b6d4, 0 0 10px #06b6d4, 0 0 15px #06b6d4;
            --glow-magenta: 0 0 5px #d946ef, 0 0 10px #d946ef, 0 0 15px #d946ef;
            --glow-amber: 0 0 5px #f59e0b, 0 0 10px #f59e0b, 0 0 15px #f59e0b;
        }

        body {
            background-color: var(--bg-color);
            color: #E6EDF3;
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 0);
            background-size: 20px 20px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .font-mono {
            font-family: 'Fira Code', monospace;
        }
        
        /* --- Glassmorphism Effect --- */
        .glass-panel {
            background: rgba(22, 27, 34, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
        }

        .glass-panel-sharp {
            background: rgba(22, 27, 34, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 0.25rem;
        }
        
        /* --- Neon Glow Effects --- */
        .glow-border-cyan {
            box-shadow: 0 0 0 1px #06b6d4;
        }

        .glow-border-magenta {
            box-shadow: 0 0 0 1px #d946ef;
        }
        
        .glow-text-cyan {
            text-shadow: var(--glow-cyan);
        }

        .glow-text-magenta {
            text-shadow: var(--glow-magenta);
        }

        /* Input focus effects */
        .input-focus:focus {
            outline: none;
            border-color: #06b6d4;
            box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.2);
        }

        /* Loading animation */
        .loading {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Error message animation */
        .error-message {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Password strength indicator */
        .strength-weak { background-color: #ef4444; }
        .strength-medium { background-color: #f59e0b; }
        .strength-strong { background-color: #10b981; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    
    <!-- Background decoration -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -right-40 w-80 h-80 bg-magenta-500 opacity-10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-cyan-500 opacity-10 rounded-full blur-3xl"></div>
    </div>

    <!-- Register Container -->
    <div class="glass-panel p-8 w-full max-w-md relative z-10">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="flex items-center justify-center mb-4">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="text-magenta-400">
                    <path d="M12 2L2 7V17L12 22L22 17V7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 7L12 12L22 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 12V22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold font-mono glow-text-magenta mb-2">Project Grid</h1>
            <p class="text-gray-400">Únete al equipo y gestiona proyectos</p>
        </div>

        <!-- Error Message -->
        <div id="error-message" class="hidden error-message bg-red-500/10 border border-red-500/20 rounded-lg p-4 mb-6">
            <div class="flex items-center gap-2 text-red-400">
                <i data-lucide="alert-circle" class="w-5 h-5"></i>
                <span id="error-text">Error en el registro</span>
            </div>
        </div>

        <!-- Success Message -->
        <div id="success-message" class="hidden error-message bg-green-500/10 border border-green-500/20 rounded-lg p-4 mb-6">
            <div class="flex items-center gap-2 text-green-400">
                <i data-lucide="check-circle" class="w-5 h-5"></i>
                <span id="success-text">¡Registro exitoso!</span>
            </div>
        </div>

        <!-- Register Form -->
        <form id="register-form" class="space-y-6">
            <div>
                <label for="name" class="block text-sm font-medium mb-2">
                    <i data-lucide="user" class="w-4 h-4 inline mr-2"></i>
                    Nombre completo
                </label>
                <input 
                    type="text" 
                    id="name" 
                    required 
                    class="w-full px-4 py-3 glass-panel-sharp input-focus transition-all duration-200"
                    placeholder="Tu nombre completo"
                    autocomplete="name"
                >
            </div>

            <div>
                <label for="email" class="block text-sm font-medium mb-2">
                    <i data-lucide="mail" class="w-4 h-4 inline mr-2"></i>
                    Correo electrónico
                </label>
                <input 
                    type="email" 
                    id="email" 
                    required 
                    class="w-full px-4 py-3 glass-panel-sharp input-focus transition-all duration-200"
                    placeholder="tu@email.com"
                    autocomplete="email"
                >
            </div>

            <div>
                <label for="level" class="block text-sm font-medium mb-2">
                    <i data-lucide="award" class="w-4 h-4 inline mr-2"></i>
                    Nivel de experiencia
                </label>
                <select 
                    id="level" 
                    required 
                    class="w-full px-4 py-3 glass-panel-sharp input-focus transition-all duration-200"
                >
                    <option value="">Selecciona tu nivel</option>
                    <option value="Junior">Junior</option>
                    <option value="Semi-Senior">Semi-Senior</option>
                    <option value="Senior">Senior</option>
                    <option value="Lead">Lead</option>
                    <option value="Principal">Principal</option>
                </select>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium mb-2">
                    <i data-lucide="lock" class="w-4 h-4 inline mr-2"></i>
                    Contraseña
                </label>
                <div class="relative">
                    <input 
                        type="password" 
                        id="password" 
                        required 
                        class="w-full px-4 py-3 glass-panel-sharp input-focus transition-all duration-200 pr-12"
                        placeholder="••••••••"
                        autocomplete="new-password"
                        minlength="6"
                    >
                    <button 
                        type="button" 
                        id="toggle-password"
                        class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-300 transition-colors"
                    >
                        <i data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                </div>
                <!-- Password strength indicator -->
                <div class="mt-2">
                    <div class="flex gap-1">
                        <div id="strength-1" class="h-1 w-1/3 bg-gray-600 rounded transition-colors"></div>
                        <div id="strength-2" class="h-1 w-1/3 bg-gray-600 rounded transition-colors"></div>
                        <div id="strength-3" class="h-1 w-1/3 bg-gray-600 rounded transition-colors"></div>
                    </div>
                    <p id="strength-text" class="text-xs text-gray-400 mt-1">Mínimo 6 caracteres</p>
                </div>
            </div>

            <div>
                <label for="confirm-password" class="block text-sm font-medium mb-2">
                    <i data-lucide="lock" class="w-4 h-4 inline mr-2"></i>
                    Confirmar contraseña
                </label>
                <div class="relative">
                    <input 
                        type="password" 
                        id="confirm-password" 
                        required 
                        class="w-full px-4 py-3 glass-panel-sharp input-focus transition-all duration-200 pr-12"
                        placeholder="••••••••"
                        autocomplete="new-password"
                    >
                    <button 
                        type="button" 
                        id="toggle-confirm-password"
                        class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-300 transition-colors"
                    >
                        <i data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                </div>
                <p id="password-match" class="text-xs mt-1 hidden"></p>
            </div>

            <div class="flex items-start gap-3">
                <input 
                    type="checkbox" 
                    id="terms" 
                    required
                    class="mt-1 rounded bg-transparent border-gray-600 text-magenta-500 focus:ring-magenta-500 focus:ring-offset-0"
                >
                <label for="terms" class="text-sm text-gray-400 cursor-pointer">
                    Acepto los 
                    <a href="#" class="text-magenta-400 hover:text-magenta-300 transition-colors">términos y condiciones</a> 
                    y la 
                    <a href="#" class="text-magenta-400 hover:text-magenta-300 transition-colors">política de privacidad</a>
                </label>
            </div>

            <button 
                type="submit" 
                id="register-btn"
                class="w-full bg-magenta-500 text-white py-3 px-4 rounded-lg hover:bg-magenta-600 transition-all duration-200 font-medium flex items-center justify-center gap-2 glow-border-magenta"
                style="box-shadow: var(--glow-magenta);"
            >
                <span id="register-text">Crear Cuenta</span>
                <i data-lucide="user-plus" class="w-5 h-5" id="register-icon"></i>
                <i data-lucide="loader-2" class="w-5 h-5 loading hidden" id="loading-icon"></i>
            </button>
        </form>

        <!-- Divider -->
        <div class="mt-8 pt-6 border-t border-gray-700">
            <p class="text-center text-gray-400 text-sm">
                ¿Ya tienes una cuenta?
                <a href="login.html" class="text-magenta-400 hover:text-magenta-300 transition-colors font-medium ml-1">
                    Inicia sesión aquí
                </a>
            </p>
        </div>

        <!-- Demo Access -->
        <div class="mt-4 pt-4 border-t border-gray-700">
            <button 
                type="button" 
                id="demo-access"
                class="w-full glass-panel-sharp py-2 px-4 text-sm text-gray-400 hover:text-gray-300 hover:bg-white/5 transition-all duration-200 rounded-lg"
            >
                <i data-lucide="eye" class="w-4 h-4 inline mr-2"></i>
                Acceso de demostración (sin registro)
            </button>
        </div>
    </div>

    <script type="module">
        import { signUp, createDeveloper } from './supabase.js';

        // Referencias DOM
        const registerForm = document.getElementById('register-form');
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const levelInput = document.getElementById('level');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirm-password');
        const termsInput = document.getElementById('terms');
        const registerBtn = document.getElementById('register-btn');
        const registerText = document.getElementById('register-text');
        const registerIcon = document.getElementById('register-icon');
        const loadingIcon = document.getElementById('loading-icon');
        const togglePasswordBtn = document.getElementById('toggle-password');
        const toggleConfirmPasswordBtn = document.getElementById('toggle-confirm-password');
        const errorMessage = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');
        const successMessage = document.getElementById('success-message');
        const successText = document.getElementById('success-text');
        const demoAccessBtn = document.getElementById('demo-access');
        const passwordMatch = document.getElementById('password-match');
        const strengthText = document.getElementById('strength-text');

        // Toggle password visibility
        togglePasswordBtn.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            
            const icon = togglePasswordBtn.querySelector('i');
            icon.setAttribute('data-lucide', isPassword ? 'eye-off' : 'eye');
            lucide.createIcons();
        });

        toggleConfirmPasswordBtn.addEventListener('click', () => {
            const isPassword = confirmPasswordInput.type === 'password';
            confirmPasswordInput.type = isPassword ? 'text' : 'password';
            
            const icon = toggleConfirmPasswordBtn.querySelector('i');
            icon.setAttribute('data-lucide', isPassword ? 'eye-off' : 'eye');
            lucide.createIcons();
        });

        // Password strength checker
        function checkPasswordStrength(password) {
            const strength1 = document.getElementById('strength-1');
            const strength2 = document.getElementById('strength-2');
            const strength3 = document.getElementById('strength-3');
            
            // Reset
            [strength1, strength2, strength3].forEach(el => {
                el.className = 'h-1 w-1/3 bg-gray-600 rounded transition-colors';
            });

            if (password.length >= 6) {
                strength1.classList.add('strength-weak');
                strengthText.textContent = 'Contraseña débil';
                strengthText.className = 'text-xs text-red-400 mt-1';
            }
            
            if (password.length >= 8 && /[A-Z]/.test(password) && /[0-9]/.test(password)) {
                strength2.classList.add('strength-medium');
                strengthText.textContent = 'Contraseña moderada';
                strengthText.className = 'text-xs text-yellow-400 mt-1';
            }
            
            if (password.length >= 10 && /[A-Z]/.test(password) && /[0-9]/.test(password) && /[^A-Za-z0-9]/.test(password)) {
                strength3.classList.add('strength-strong');
                strengthText.textContent = 'Contraseña fuerte';
                strengthText.className = 'text-xs text-green-400 mt-1';
            }

            if (password.length === 0) {
                strengthText.textContent = 'Mínimo 6 caracteres';
                strengthText.className = 'text-xs text-gray-400 mt-1';
            }
        }

        // Password confirmation checker
        function checkPasswordMatch() {
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            
            if (confirmPassword.length === 0) {
                passwordMatch.classList.add('hidden');
                return;
            }
            
            passwordMatch.classList.remove('hidden');
            
            if (password === confirmPassword) {
                passwordMatch.textContent = 'Las contraseñas coinciden';
                passwordMatch.className = 'text-xs text-green-400 mt-1';
            } else {
                passwordMatch.textContent = 'Las contraseñas no coinciden';
                passwordMatch.className = 'text-xs text-red-400 mt-1';
            }
        }

        // Event listeners for password validation
        passwordInput.addEventListener('input', () => {
            checkPasswordStrength(passwordInput.value);
            checkPasswordMatch();
        });

        confirmPasswordInput.addEventListener('input', checkPasswordMatch);

        // Show error message
        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.remove('hidden');
            successMessage.classList.add('hidden');
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                errorMessage.classList.add('hidden');
            }, 5000);
        }

        // Show success message
        function showSuccess(message) {
            successText.textContent = message;
            successMessage.classList.remove('hidden');
            errorMessage.classList.add('hidden');
        }

        // Set loading state
        function setLoading(loading) {
            registerBtn.disabled = loading;
            
            if (loading) {
                registerText.textContent = 'Creando cuenta...';
                registerIcon.classList.add('hidden');
                loadingIcon.classList.remove('hidden');
                registerBtn.classList.add('opacity-75');
            } else {
                registerText.textContent = 'Crear Cuenta';
                registerIcon.classList.remove('hidden');
                loadingIcon.classList.add('hidden');
                registerBtn.classList.remove('opacity-75');
            }
        }

        // Handle register form submission
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = nameInput.value.trim();
            const email = emailInput.value.trim();
            const level = levelInput.value;
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            const termsAccepted = termsInput.checked;

            // Validation
            if (!name || !email || !level || !password || !confirmPassword) {
                showError('Por favor, completa todos los campos');
                return;
            }

            if (password !== confirmPassword) {
                showError('Las contraseñas no coinciden');
                return;
            }

            if (password.length < 6) {
                showError('La contraseña debe tener al menos 6 caracteres');
                return;
            }

            if (!termsAccepted) {
                showError('Debes aceptar los términos y condiciones');
                return;
            }

            setLoading(true);

            try {
                // Create user account
                const user = await signUp(email, password);
                
                if (user) {
                    // Create developer profile
                    try {
                        await createDeveloper({
                            name: name,
                            email: email,
                            level: level,
                            is_active: true
                        });
                    } catch (devError) {
                        console.warn('Error creando perfil de desarrollador:', devError);
                        // Continue anyway, the user account was created
                    }
                    
                    showSuccess('¡Cuenta creada exitosamente! Revisa tu email para confirmar tu cuenta.');
                    
                    // Clear form
                    registerForm.reset();
                    
                    // Redirect to login after delay
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                } else {
                    showError('Error al crear la cuenta');
                }
            } catch (error) {
                console.error('Error durante el registro:', error);
                
                // Handle specific Supabase errors
                if (error.message.includes('User already registered')) {
                    showError('Este email ya está registrado. Intenta iniciar sesión en su lugar.');
                } else if (error.message.includes('Password should be at least')) {
                    showError('La contraseña debe tener al menos 6 caracteres.');
                } else if (error.message.includes('Invalid email')) {
                    showError('Por favor, ingresa un email válido.');
                } else if (error.message.includes('signup is disabled')) {
                    showError('El registro está temporalmente deshabilitado.');
                } else {
                    showError('Error de conexión. Verifica tu internet e intenta de nuevo.');
                }
            } finally {
                setLoading(false);
            }
        });

        // Demo access button
        demoAccessBtn.addEventListener('click', () => {
            // Set a flag to bypass auth check in main app
            sessionStorage.setItem('demoMode', 'true');
            window.location.href = 'index.html';
        });

        // Initialize Lucide icons
        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>
</body>
</html>
