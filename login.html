<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Project Grid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0D1117;
            --border-color: rgba(255, 255, 255, 0.1);
            --glow-cyan: 0 0 5px #06b6d4, 0 0 10px #06b6d4, 0 0 15px #06b6d4;
            --glow-magenta: 0 0 5px #d946ef, 0 0 10px #d946ef, 0 0 15px #d946ef;
            --glow-amber: 0 0 5px #f59e0b, 0 0 10px #f59e0b, 0 0 15px #f59e0b;
        }

        body {
            background-color: var(--bg-color);
            color: #E6EDF3;
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 0);
            background-size: 20px 20px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .font-mono {
            font-family: 'Fira Code', monospace;
        }
        
        /* --- Glassmorphism Effect --- */
        .glass-panel {
            background: rgba(22, 27, 34, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
        }

        .glass-panel-sharp {
            background: rgba(22, 27, 34, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 0.25rem;
        }
        
        /* --- Neon Glow Effects --- */
        .glow-border-cyan {
            box-shadow: 0 0 0 1px #06b6d4;
        }
        
        .glow-text-cyan {
            text-shadow: var(--glow-cyan);
        }

        /* Input focus effects */
        .input-focus:focus {
            outline: none;
            border-color: #06b6d4;
            box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.2);
        }

        /* Loading animation */
        .loading {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Error message animation */
        .error-message {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    
    <!-- Background decoration -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -right-40 w-80 h-80 bg-cyan-500 opacity-10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-magenta-500 opacity-10 rounded-full blur-3xl"></div>
    </div>

    <!-- Login Container -->
    <div class="glass-panel p-8 w-full max-w-md relative z-10">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="flex items-center justify-center mb-4">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="text-cyan-400">
                    <path d="M12 2L2 7V17L12 22L22 17V7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 7L12 12L22 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 12V22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold font-mono glow-text-cyan mb-2">Project Grid</h1>
            <p class="text-gray-400">Inicia sesión para acceder al dashboard</p>
        </div>

        <!-- Error Message -->
        <div id="error-message" class="hidden error-message bg-red-500/10 border border-red-500/20 rounded-lg p-4 mb-6">
            <div class="flex items-center gap-2 text-red-400">
                <i data-lucide="alert-circle" class="w-5 h-5"></i>
                <span id="error-text">Error de autenticación</span>
            </div>
        </div>

        <!-- Success Message -->
        <div id="success-message" class="hidden error-message bg-green-500/10 border border-green-500/20 rounded-lg p-4 mb-6">
            <div class="flex items-center gap-2 text-green-400">
                <i data-lucide="check-circle" class="w-5 h-5"></i>
                <span id="success-text">¡Bienvenido de vuelta!</span>
            </div>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium mb-2">
                    <i data-lucide="mail" class="w-4 h-4 inline mr-2"></i>
                    Correo electrónico
                </label>
                <input 
                    type="email" 
                    id="email" 
                    required 
                    class="w-full px-4 py-3 glass-panel-sharp input-focus transition-all duration-200"
                    placeholder="tu@email.com"
                    autocomplete="email"
                >
            </div>

            <div>
                <label for="password" class="block text-sm font-medium mb-2">
                    <i data-lucide="lock" class="w-4 h-4 inline mr-2"></i>
                    Contraseña
                </label>
                <div class="relative">
                    <input 
                        type="password" 
                        id="password" 
                        required 
                        class="w-full px-4 py-3 glass-panel-sharp input-focus transition-all duration-200 pr-12"
                        placeholder="••••••••"
                        autocomplete="current-password"
                    >
                    <button 
                        type="button" 
                        id="toggle-password"
                        class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-300 transition-colors"
                    >
                        <i data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="remember" class="rounded bg-transparent border-gray-600 text-cyan-500 focus:ring-cyan-500 focus:ring-offset-0">
                    <span class="text-gray-400">Recordarme</span>
                </label>
                <a href="#" class="text-cyan-400 hover:text-cyan-300 transition-colors">
                    ¿Olvidaste tu contraseña?
                </a>
            </div>

            <button 
                type="submit" 
                id="login-btn"
                class="w-full bg-cyan-500 text-white py-3 px-4 rounded-lg hover:bg-cyan-600 transition-all duration-200 font-medium flex items-center justify-center gap-2 glow-border-cyan"
                style="box-shadow: var(--glow-cyan);"
            >
                <span id="login-text">Iniciar Sesión</span>
                <i data-lucide="log-in" class="w-5 h-5" id="login-icon"></i>
                <i data-lucide="loader-2" class="w-5 h-5 loading hidden" id="loading-icon"></i>
            </button>
        </form>

        <!-- Divider -->
        <div class="mt-8 pt-6 border-t border-gray-700">
            <p class="text-center text-gray-400 text-sm">
                ¿No tienes una cuenta?
                <a href="register.html" class="text-cyan-400 hover:text-cyan-300 transition-colors font-medium ml-1">
                    Regístrate aquí
                </a>
            </p>
        </div>

        <!-- Demo Access -->
        <div class="mt-4 pt-4 border-t border-gray-700">
            <button 
                type="button" 
                id="demo-access"
                class="w-full glass-panel-sharp py-2 px-4 text-sm text-gray-400 hover:text-gray-300 hover:bg-white/5 transition-all duration-200 rounded-lg"
            >
                <i data-lucide="eye" class="w-4 h-4 inline mr-2"></i>
                Acceso de demostración (sin login)
            </button>
        </div>
    </div>

    <script type="module">
        import { signIn } from './supabase.js';

        // Referencias DOM
        const loginForm = document.getElementById('login-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const rememberInput = document.getElementById('remember');
        const loginBtn = document.getElementById('login-btn');
        const loginText = document.getElementById('login-text');
        const loginIcon = document.getElementById('login-icon');
        const loadingIcon = document.getElementById('loading-icon');
        const togglePasswordBtn = document.getElementById('toggle-password');
        const errorMessage = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');
        const successMessage = document.getElementById('success-message');
        const successText = document.getElementById('success-text');
        const demoAccessBtn = document.getElementById('demo-access');

        // Toggle password visibility
        togglePasswordBtn.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            
            const icon = togglePasswordBtn.querySelector('i');
            icon.setAttribute('data-lucide', isPassword ? 'eye-off' : 'eye');
            lucide.createIcons();
        });

        // Show error message
        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.remove('hidden');
            successMessage.classList.add('hidden');
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                errorMessage.classList.add('hidden');
            }, 5000);
        }

        // Show success message
        function showSuccess(message) {
            successText.textContent = message;
            successMessage.classList.remove('hidden');
            errorMessage.classList.add('hidden');
        }

        // Set loading state
        function setLoading(loading) {
            loginBtn.disabled = loading;
            
            if (loading) {
                loginText.textContent = 'Iniciando sesión...';
                loginIcon.classList.add('hidden');
                loadingIcon.classList.remove('hidden');
                loginBtn.classList.add('opacity-75');
            } else {
                loginText.textContent = 'Iniciar Sesión';
                loginIcon.classList.remove('hidden');
                loadingIcon.classList.add('hidden');
                loginBtn.classList.remove('opacity-75');
            }
        }

        // Handle login form submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const remember = rememberInput.checked;

            if (!email || !password) {
                showError('Por favor, completa todos los campos');
                return;
            }

            setLoading(true);

            try {
                const user = await signIn(email, password);
                
                if (user) {
                    showSuccess('¡Sesión iniciada correctamente!');
                    
                    // Save remember preference
                    if (remember) {
                        localStorage.setItem('rememberLogin', 'true');
                        localStorage.setItem('userEmail', email);
                    } else {
                        localStorage.removeItem('rememberLogin');
                        localStorage.removeItem('userEmail');
                    }
                    
                    // Redirect to dashboard after short delay
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    showError('Credenciales incorrectas');
                }
            } catch (error) {
                console.error('Error durante el login:', error);
                
                // Handle specific Supabase errors
                if (error.message.includes('Invalid login credentials')) {
                    showError('Credenciales incorrectas. Verifica tu email y contraseña.');
                } else if (error.message.includes('Email not confirmed')) {
                    showError('Por favor, confirma tu email antes de iniciar sesión.');
                } else if (error.message.includes('Too many requests')) {
                    showError('Demasiados intentos. Intenta de nuevo en unos minutos.');
                } else {
                    showError('Error de conexión. Verifica tu internet e intenta de nuevo.');
                }
            } finally {
                setLoading(false);
            }
        });

        // Demo access button
        demoAccessBtn.addEventListener('click', () => {
            // Set a flag to bypass auth check in main app
            sessionStorage.setItem('demoMode', 'true');
            window.location.href = 'index.html';
        });

        // Load remembered email
        window.addEventListener('DOMContentLoaded', () => {
            const rememberedEmail = localStorage.getItem('userEmail');
            const rememberLogin = localStorage.getItem('rememberLogin');
            
            if (rememberLogin === 'true' && rememberedEmail) {
                emailInput.value = rememberedEmail;
                rememberInput.checked = true;
            }

            // Initialize Lucide icons
            lucide.createIcons();
        });

        // Enter key handling
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (emailInput === document.activeElement || passwordInput === document.activeElement)) {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
